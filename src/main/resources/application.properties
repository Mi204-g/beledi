# ===== BASE DE DONNÉES SUPABASE =====
# ?sslmode=require : Supabase exige une connexion SSL sécurisée
spring.datasource.url=jdbc:postgresql://aws-1-eu-west-3.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.njnwfcbgreigrxlpitpr
spring.datasource.password=Baladi2026@db
spring.datasource.driver-class-name=org.postgresql.Driver
# ===== POOL DE CONNEXIONS HIKARICP =====
# Supabase (plan gratuit) limite le nombre de connexions simultanées
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000

# ===== JPA / HIBERNATE =====
# PostgreSQLDialect : Hibernate sait qu'on parle à PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# update = crée/modifie les tables automatiquement sans effacer les données existantes
# Attention : en production, utiliser 'validate' ou des migrations Flyway/Liquibase
spring.jpa.hibernate.ddl-auto=update
# Affiche les requêtes SQL dans la console (utile pour le débogage)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT (JSON Web Token) =====
# Secret utilisé pour signer les tokens JWT
# IMPORTANT : Change cette valeur en production ! Minimum 32 caractères pour HS256.
jwt.secret=baladiSecretKey2024GroupeG11SupnumMauritanie_SuperSecure!
# Durée de validité du token = 24 heures (en millisecondes)
jwt.expiration=86400000

# ===== SERVEUR =====
server.port=8080

# ===== UPLOAD DE FICHIERS =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
