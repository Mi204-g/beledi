<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Baladi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
<style>
* { font-family: 'Inter', sans-serif; }
.page-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 45%, #0ea5e9 80%, #06b6d4 100%); min-height:100vh; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.fade-up { animation: fadeUp 0.45s ease forwards; }
.input-field {
  width:100%; padding:12px 12px 12px 44px; border:2px solid #e2e8f0; border-radius:12px;
  font-size:15px; transition:all 0.2s; outline:none; background:#fafafa;
}
.input-field:focus { border-color:#2563eb; background:white; box-shadow:0 0 0 4px rgba(37,99,235,0.08); }
</style>
</head>
<body class="page-gradient flex items-center justify-center p-4">

<!-- Back -->
<a href="/" class="fixed top-6 left-6 flex items-center gap-2 text-white/80 hover:text-white font-medium transition-colors bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl backdrop-blur-sm">
  <i class="fas fa-arrow-left"></i>Accueil
</a>

<div class="w-full max-w-md fade-up">
  <!-- Logo card top -->
  <div class="text-center mb-8">
    <div class="w-16 h-16 bg-white/20 backdrop-blur-sm rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl">
      <i class="fas fa-city text-white text-2xl"></i>
    </div>
    <h1 class="text-3xl font-black text-white">BALADI</h1>
    <p class="text-white/65 mt-1">Connexion à votre compte</p>
  </div>

  <!-- Form card -->
  <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
    <div class="p-8">
      <!-- Error alert -->
      <div id="alertErr" class="hidden flex items-center gap-3 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl mb-6 text-sm">
        <i class="fas fa-exclamation-circle text-red-500 flex-shrink-0"></i>
        <span id="alertErrText"></span>
      </div>

      <form id="loginForm" class="space-y-5">
        <!-- Email -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Adresse email</label>
          <div class="relative">
            <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="email" id="email" class="input-field" placeholder="votre@email.com" required>
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Mot de passe</label>
          <div class="relative">
            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="password" id="motDePasse" class="input-field" placeholder="••••••••" required>
            <button type="button" onclick="togglePwd()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
              <i class="fas fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" id="submitBtn"
                class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 text-white font-bold py-3.5 rounded-xl hover:opacity-90 hover:-translate-y-0.5 transition-all duration-200 shadow-lg shadow-blue-200 flex items-center justify-center gap-2 text-base mt-2">
          <i class="fas fa-sign-in-alt"></i>Se connecter
        </button>
      </form>

      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
        <div class="relative text-center"><span class="bg-white px-4 text-gray-400 text-sm">ou</span></div>
      </div>

      <p class="text-center text-gray-500 text-sm">
        Pas encore de compte ?
        <a href="/register.html" class="text-blue-600 font-semibold hover:text-blue-700 hover:underline ml-1">Créer un compte</a>
      </p>

      <!-- Demo credentials -->
      <div class="mt-6 bg-blue-50 rounded-2xl p-4 border border-blue-100">
        <p class="text-blue-700 text-xs font-semibold mb-2"><i class="fas fa-info-circle mr-1"></i>Comptes de démonstration</p>
        <div class="space-y-1.5">
          <button onclick="fillDemo('admin@baladi.mr','admin123')" class="w-full text-left text-xs bg-white hover:bg-blue-50 border border-blue-200 rounded-xl px-3 py-2 transition-colors flex items-center justify-between group">
            <span><span class="font-semibold text-blue-700">Admin</span> — admin@baladi.mr</span>
            <span class="text-blue-400 group-hover:text-blue-600 font-mono">admin123</span>
          </button>
          <button onclick="fillDemo('ahmed@baladi.mr','citoyen123')" class="w-full text-left text-xs bg-white hover:bg-blue-50 border border-blue-200 rounded-xl px-3 py-2 transition-colors flex items-center justify-between group">
            <span><span class="font-semibold text-gray-700">Citoyen</span> — ahmed@baladi.mr</span>
            <span class="text-blue-400 group-hover:text-blue-600 font-mono">citoyen123</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/utils.js"></script>
<script>
// Redirect if already logged in
if (getToken()) window.location.href = getUser()?.role==='ADMIN' ? '/admin.html' : '/dashboard.html';

function togglePwd() {
  const inp = document.getElementById('motDePasse');
  const ico = document.getElementById('eyeIcon');
  if (inp.type==='password') { inp.type='text';  ico.className='fas fa-eye-slash'; }
  else                       { inp.type='password'; ico.className='fas fa-eye'; }
}
function fillDemo(email, pwd) {
  document.getElementById('email').value = email;
  document.getElementById('motDePasse').value = pwd;
}
function showErr(msg) {
  const el = document.getElementById('alertErr');
  document.getElementById('alertErrText').textContent = msg;
  el.classList.remove('hidden'); el.classList.add('flex');
}

document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>Connexion…';
  document.getElementById('alertErr').classList.add('hidden');

  const res = await apiPost('/auth/login', {
    email: document.getElementById('email').value.trim(),
    motDePasse: document.getElementById('motDePasse').value
  });

  if (res.status === 200) {
    setAuth(res.data.token, { nom: res.data.nom, email: res.data.email, role: res.data.role });
    window.location.href = res.data.role === 'ADMIN' ? '/admin.html' : '/dashboard.html';
  } else {
    showErr(res.data.erreur || 'Email ou mot de passe incorrect');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i>Se connecter';
  }
});
</script>
</body>
</html>
