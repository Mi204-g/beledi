<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription — Beledi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
<style>
* { font-family: 'Inter', sans-serif; }
.page-gradient { background: linear-gradient(135deg, #ffffff 0%, #e0f2fe 45%, #ffffff 80%, #e0f2fe 100%); min-height:100vh; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.fade-up { animation: fadeUp 0.45s ease forwards; }
.input-field {
  width:100%; padding:12px 12px 12px 44px; border:2px solid #e2e8f0; border-radius:12px;
  font-size:15px; transition:all 0.2s; outline:none; background:#fafafa;
}
.input-field:focus { border-color:#2563eb; background:white; box-shadow:0 0 0 4px rgba(37,99,235,0.08); }
.strength-bar { height:4px; border-radius:4px; transition:all 0.3s; }
</style>
</head>
<body class="page-gradient flex items-center justify-center p-4 py-12">

<!-- Back -->
<a href="/" class="fixed top-6 left-6 flex items-center gap-2 text-gray-600 hover:text-gray-800 font-medium transition-colors bg-white/80 hover:bg-white px-4 py-2 rounded-xl backdrop-blur-sm border border-gray-200">
  <i class="fas fa-arrow-left"></i>Accueil
</a>

<div class="w-full max-w-md fade-up">
  <!-- Logo card top -->
  <div class="text-center mb-8">
    <div class="w-16 h-16 bg-blue-100 backdrop-blur-sm rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl">
      <i class="fas fa-city text-blue-600 text-2xl"></i>
    </div>
    <h1 class="text-3xl font-black text-gray-800">BELEDI</h1>
    <p class="text-gray-500 mt-1">Rejoignez la communauté citoyenne</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
    <div class="p-8">
      <!-- Success -->
      <div id="alertOk" class="hidden flex items-center gap-3 bg-emerald-50 border border-emerald-200 text-emerald-700 px-4 py-3 rounded-xl mb-6 text-sm">
        <i class="fas fa-check-circle text-emerald-500 flex-shrink-0"></i>
        <span>Compte créé avec succès ! Redirection…</span>
      </div>
      <!-- Error -->
      <div id="alertErr" class="hidden flex items-center gap-3 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl mb-6 text-sm">
        <i class="fas fa-exclamation-circle text-red-500 flex-shrink-0"></i>
        <span id="alertErrText"></span>
      </div>

      <form id="registerForm" class="space-y-5">
        <!-- Nom -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Nom complet</label>
          <div class="relative">
            <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="text" id="nom" class="input-field" placeholder="Nom complet" required minlength="2">
          </div>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Adresse email</label>
          <div class="relative">
            <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="email" id="email" class="input-field" placeholder="votre@email.com" required>
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Mot de passe</label>
          <div class="relative">
            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="password" id="motDePasse" class="input-field" placeholder="Minimum 6 caractères" required minlength="6"
                   oninput="checkStrength(this.value)">
            <button type="button" onclick="togglePwd()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
              <i class="fas fa-eye" id="eyeIcon"></i>
            </button>
          </div>
          <!-- Strength indicator -->
          <div class="mt-2 flex gap-1">
            <div class="strength-bar flex-1 bg-gray-200" id="s1"></div>
            <div class="strength-bar flex-1 bg-gray-200" id="s2"></div>
            <div class="strength-bar flex-1 bg-gray-200" id="s3"></div>
          </div>
          <p class="text-xs text-gray-400 mt-1" id="strengthLabel">Entrez un mot de passe</p>
        </div>

        <!-- Terms -->
        <label class="flex items-start gap-3 cursor-pointer">
          <input type="checkbox" id="terms" required class="mt-0.5 w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
          <span class="text-sm text-gray-600">
            J'accepte de partager mes signalements pour améliorer la ville et je confirme que mes rapports sont véridiques.
          </span>
        </label>

        <!-- Submit -->
        <button type="submit" id="submitBtn"
                class="w-full bg-gradient-to-r from-blue-300 to-cyan-300 text-gray-700 font-bold py-3.5 rounded-xl hover:opacity-90 hover:-translate-y-0.5 transition-all duration-200 shadow-lg shadow-blue-100 flex items-center justify-center gap-2 text-base mt-2">
          <i class="fas fa-user-plus"></i>Créer mon compte
        </button>
      </form>

      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
        <div class="relative text-center"><span class="bg-white px-4 text-gray-400 text-sm">ou</span></div>
      </div>

      <p class="text-center text-gray-500 text-sm">
        Déjà un compte ?
        <a href="/login.html" class="text-blue-600 font-semibold hover:text-blue-700 hover:underline ml-1">Se connecter</a>
      </p>
    </div>
  </div>
</div>

<script src="/js/utils.js"></script>
<script>
if (getToken()) window.location.href = '/dashboard.html';

function togglePwd() {
  const inp = document.getElementById('motDePasse');
  const ico = document.getElementById('eyeIcon');
  if (inp.type==='password') { inp.type='text'; ico.className='fas fa-eye-slash'; }
  else { inp.type='password'; ico.className='fas fa-eye'; }
}

function checkStrength(val) {
  let score = 0;
  if (val.length >= 6)  score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val) || /[0-9]/.test(val)) score++;
  const colors = ['bg-red-400','bg-amber-400','bg-emerald-500'];
  const labels = ['Faible','Moyen','Fort'];
  for (let i=1;i<=3;i++) {
    const bar = document.getElementById('s'+i);
    bar.className = 'strength-bar flex-1 ' + (i<=score ? colors[score-1] : 'bg-gray-200');
  }
  document.getElementById('strengthLabel').textContent = score ? labels[score-1] : 'Entrez un mot de passe';
}

function showErr(msg) {
  const el = document.getElementById('alertErr');
  document.getElementById('alertErrText').textContent = msg;
  el.classList.remove('hidden'); el.classList.add('flex');
}

document.getElementById('registerForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>Création du compte…';
  document.getElementById('alertErr').classList.add('hidden');

  const res = await apiPost('/auth/register', {
    nom: document.getElementById('nom').value.trim(),
    email: document.getElementById('email').value.trim(),
    motDePasse: document.getElementById('motDePasse').value
  });

  if (res.status === 200) {
    setAuth(res.data.token, { nom: res.data.nom, email: res.data.email, role: res.data.role });
    document.getElementById('alertOk').classList.remove('hidden');
    document.getElementById('alertOk').classList.add('flex');
    setTimeout(() => window.location.href = '/dashboard.html', 1200);
  } else {
    showErr(res.data.erreur || 'Une erreur est survenue. Veuillez réessayer.');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-user-plus"></i>Créer mon compte';
  }
});
</script>
</body>
</html>
