# ===== BASE DE DONNÉES H2 (DÉVELOPPEMENT LOCAL) =====
spring.datasource.url=jdbc:h2:mem:beledidb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# Accès à la console H2: http://localhost:8080/h2-console
spring.h2.console.enabled=true

# ===== JPA / HIBERNATE =====
# H2Dialect : Hibernate sait qu'on parle à H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# update = crée/modifie les tables automatiquement sans effacer les données existantes
# Attention : en production, utiliser 'validate' ou des migrations Flyway/Liquibase
spring.jpa.hibernate.ddl-auto=update
# Affiche les requêtes SQL dans la console (utile pour le débogage)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT (JSON Web Token) =====
# Secret utilisé pour signer les tokens JWT
# IMPORTANT : Change cette valeur en production ! Minimum 32 caractères pour HS256.
jwt.secret=belediSecretKey2024GroupeG11SupnumMauritanie_SuperSecure!
# Durée de validité du token = 24 heures (en millisecondes)
jwt.expiration=86400000

# ===== SERVEUR =====
server.port=8080

# ===== UPLOAD DE FICHIERS =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB